# Base pipeline configuration — override per experiment
# All models are local/free. No API costs.

ingestion:
  sec_user_agent: ${oc.env:SEC_USER_AGENT}
  tickers: ["AAPL", "MSFT", "TSLA", "GOOGL", "AMZN"]
  filing_types: ["10-K", "10-Q"]
  years: [2021, 2022, 2023, 2024]
  raw_data_dir: data/raw
  processed_data_dir: data/processed

chunking:
  strategy: recursive          # Options: fixed, recursive, semantic, sentence_window, parent_child
  chunk_size: 512
  chunk_overlap: 64
  separators: ["\n\n", "\n", ". ", " "]
  sentence_window_size: 2               # sentence_window: +/- N sentences kept as context_text
  semantic_similarity_threshold: 0.55    # semantic: cosine sim below this starts a new chunk
  parent_chunk_size: 2048                # parent_child: size of the context chunk fetched at generation time
  child_chunk_size: 512                  # parent_child: size of the chunk actually embedded/indexed

embeddings:
  dense_model: BAAI/bge-m3              # Local sentence-transformers model, no API cost
  dense_dimensions: 1024                # BGE-M3 dense output dimension
  sparse_model: bm25                    # Options: bm25, splade
  batch_size: 32                        # Lower than OpenAI batch — GPU/CPU memory bound

indexing:
  collection_name: financial_rag
  distance_metric: cosine
  hnsw_m: 16
  hnsw_ef_construct: 200
  qdrant_path: data/index/qdrant_local   # embedded Qdrant (no Docker) — local-mode storage dir
  bm25_vocab_path: data/index/bm25_vocab.json  # persisted BM25 vocab+idf, reused by query-time encoding

retrieval:
  top_k_dense: 20
  top_k_sparse: 20
  top_k_rerank: 5
  hybrid_alpha: 0.5                     # 0 = pure sparse, 1 = pure dense
  reranker: bge                         # BAAI/bge-reranker-v2-m3, local cross-encoder, free

query:
  use_hyde: true
  use_multi_query: true
  use_decomposition: false              # Enable for multi-hop questions
  num_multi_queries: 3

generation:
  provider: ollama                      # Local Ollama server, no API cost
  model: llama3.2:3b                    # Options: llama3.2:3b, llama3.1, mistral, phi3 — must match `ollama list` tag exactly
  ollama_host: ${oc.env:OLLAMA_HOST}
  temperature: 0.0
  max_tokens: 1024
  citation_style: inline                # Options: inline, footnote, list

evaluation:
  dataset: data/eval/financebench.json
  metrics: [faithfulness, answer_relevancy, context_precision, context_recall]
  batch_size: 10
