# Base pipeline configuration — override per experiment

ingestion:
  sec_user_agent: ${SEC_USER_AGENT}
  tickers: ["AAPL", "MSFT", "TSLA", "GOOGL", "AMZN"]
  filing_types: ["10-K", "10-Q"]
  years: [2021, 2022, 2023, 2024]
  raw_data_dir: data/raw
  processed_data_dir: data/processed

chunking:
  strategy: recursive          # Options: fixed, recursive, semantic, sentence_window, parent_child
  chunk_size: 512
  chunk_overlap: 64
  separators: ["\n\n", "\n", ". ", " "]

embeddings:
  dense_model: text-embedding-3-large
  dense_dimensions: 3072
  sparse_model: bm25            # Options: bm25, splade
  batch_size: 64

indexing:
  collection_name: financial_rag
  distance_metric: cosine
  hnsw_m: 16
  hnsw_ef_construct: 200

retrieval:
  top_k_dense: 20
  top_k_sparse: 20
  top_k_rerank: 5
  hybrid_alpha: 0.5             # 0 = pure sparse, 1 = pure dense
  reranker: cohere              # Options: cohere, bge

query:
  use_hyde: true
  use_multi_query: true
  use_decomposition: false      # Enable for multi-hop questions
  num_multi_queries: 3

generation:
  model: gpt-4o
  temperature: 0.0
  max_tokens: 1024
  citation_style: inline        # Options: inline, footnote, list

evaluation:
  dataset: data/eval/financebench.json
  metrics: [faithfulness, answer_relevancy, context_precision, context_recall]
  batch_size: 10
